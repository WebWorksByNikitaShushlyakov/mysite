<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <h1>JavaScript Forms</h1>
    <div class="wrapper">
      <form name="form1" class="container">
        <p>Поле ввода</p>
        <input type="text" name="name_input" value="text23">
        <p>Текстовое поле ввода</p>
        <textarea name="name_textarea" rows="7" cols="60"></textarea>
        <button type="button" name="button">Button</button>
      </form>
      <div class="container">
        <form class="list_radio">
          <h2>Радиокнопки</h2>
          <input type="radio" name="r1" value="" checked><p>Кнопка 1</p>
          <input type="radio" name="r1" value=""><p>Кнопка 2</p>
        </form>
        <form class="list_checkbox">
          <h2>Чекбокс</h2>
          <input type="checkbox" name="r1" value=""><p>Чекбокс</p>
        </form>
        <form class="form_file">
          <h2>Прикрепить файл</h2>
          <input type="file" name="" value="">
        </form>
        <form class="list">
          <p>Список</p>
          <select class="list_select" name="">
            <option value="1">Point 1</option>
            <option value="2">Point 2</option>
            <option value="3">Point 3</option>
          </select>
        </form>
      </div>
    </div>
   <script src="js/script.js"></script>
  </body>
</html>
